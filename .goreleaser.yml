version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: stacklit
    main: ./cmd/stacklit
    binary: stacklit
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/glincker/stacklit/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "stacklit_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  github:
    owner: glincker
    name: stacklit
