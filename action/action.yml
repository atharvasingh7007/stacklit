name: 'Update Stacklit Index'
description: 'Generate or update stacklit.json codebase index'
inputs:
  commit:
    description: 'Auto-commit updated index files'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Install stacklit
      shell: bash
      run: go install github.com/glincker/stacklit/cmd/stacklit@latest
    - name: Generate index
      shell: bash
      run: stacklit generate --quiet
    - name: Commit changes
      if: inputs.commit == 'true'
      shell: bash
      run: |
        git config user.name "stacklit[bot]"
        git config user.email "stacklit[bot]@users.noreply.github.com"
        git add stacklit.json DEPENDENCIES.md 2>/dev/null || true
        git diff --staged --quiet || git commit -m "chore: update stacklit index"
        git push || true
